<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" content="#f2f2f7" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)" />
    <meta name="description" content="Clash web port" />
    <script>
      (function () {
        var key = 'clash-dashboard-theme';
        var pref = localStorage.getItem(key) || 'auto';
        if (pref === 'system') pref = 'auto';
        if (pref !== 'light' && pref !== 'dark' && pref !== 'auto') pref = 'auto';
        document.documentElement.dataset.theme = pref;
        document.documentElement.style.colorScheme = pref === 'auto' ? 'light dark' : pref;
      })();
    </script>
    <!--meta name="external-controller" content="http://secret@example.com:9090"-->
    <title>Clash</title>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <script type="module" src="/src/index.ts"></script>
  </body>
</html>
